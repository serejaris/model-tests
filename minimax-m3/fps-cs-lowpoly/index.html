<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>minimax — low poly FPS</title>
    <link rel="icon" href="data:," />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; color: #eee; font-family: 'Courier New', monospace; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100% !important; height: 100% !important; }

      #hud { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
      #crosshair {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        width: 18px; height: 18px; mix-blend-mode: difference;
      }
      #crosshair::before, #crosshair::after {
        content: ''; position: absolute; background: #fff;
      }
      #crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
      #crosshair::after  { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }

      #stats {
        position: absolute; left: 16px; bottom: 16px;
        font-size: 18px; line-height: 1.5; color: #f5f5f5;
        text-shadow: 0 1px 2px rgba(0,0,0,.8);
      }
      #stats .row { display: flex; gap: 8px; align-items: center; }
      #stats .bar { width: 140px; height: 8px; background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.4); }
      #stats .bar > i { display: block; height: 100%; background: #6f6; width: 100%; transition: width .12s linear; }
      #stats .bar.low > i { background: #f55; }
      #stats .label { width: 64px; opacity: .85; }
      #stats .val { font-weight: 700; min-width: 36px; }

      #enemies {
        position: absolute; right: 16px; top: 16px;
        font-size: 16px; line-height: 1.5; text-align: right;
        text-shadow: 0 1px 2px rgba(0,0,0,.8);
      }

      #message {
        position: absolute; left: 50%; top: 22%;
        transform: translateX(-50%);
        font-size: 14px; letter-spacing: 1px; color: #fff;
        text-shadow: 0 1px 2px rgba(0,0,0,.8);
        opacity: 0; transition: opacity .2s ease;
      }
      #message.show { opacity: 1; }

      #hit {
        position: absolute; inset: 0;
        background: radial-gradient(ellipse at center, transparent 55%, rgba(255,0,0,.45) 100%);
        opacity: 0; transition: opacity .15s ease;
        pointer-events: none;
      }
      #hit.show { opacity: 1; }

      #overlay {
        position: fixed; inset: 0; z-index: 10;
        display: flex; align-items: center; justify-content: center;
        background: rgba(0,0,0,.7); backdrop-filter: blur(2px);
        text-align: center; padding: 24px;
      }
      #overlay.hidden { display: none; }
      #overlay h1 {
        font-size: 42px; letter-spacing: 4px; margin-bottom: 16px;
        text-shadow: 0 2px 4px rgba(0,0,0,.6);
      }
      #overlay p { font-size: 16px; margin: 4px 0; opacity: .9; }
      #overlay .keys { margin: 16px 0; font-size: 14px; opacity: .8; }
      #overlay .keys span { display: inline-block; padding: 2px 8px; border: 1px solid #888; border-radius: 4px; margin: 0 2px; }
      #overlay .btn {
        display: inline-block; margin-top: 18px; padding: 10px 24px;
        font: inherit; color: #fff; background: #c33; border: none;
        cursor: pointer; letter-spacing: 2px; text-transform: uppercase;
      }
      #overlay .btn:hover { background: #e44; }
      #overlay.win h1 { color: #6f6; }
      #overlay.lose h1 { color: #f55; }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div id="crosshair"></div>
      <div id="stats">
        <div class="row"><span class="label">HP</span><div class="bar"><i id="hp-bar"></i></div><span class="val" id="hp-val">100</span></div>
        <div class="row"><span class="label">AMMO</span><div class="bar"><i id="ammo-bar"></i></div><span class="val" id="ammo-val">30</span></div>
      </div>
      <div id="enemies">ENEMIES <span id="enemies-val">5</span></div>
      <div id="message">RELOADING…</div>
      <div id="hit"></div>
    </div>

    <div id="overlay">
      <div>
        <h1>MINIMAX</h1>
        <p>low poly fps · cs 1.6 vibes</p>
        <div class="keys">
          <span>W</span><span>A</span><span>S</span><span>D</span> move &nbsp;·&nbsp;
          <span>MOUSE</span> look &nbsp;·&nbsp;
          <span>LMB</span> shoot &nbsp;·&nbsp;
          <span>R</span> reload &nbsp;·&nbsp;
          <span>SHIFT</span> run
        </div>
        <button class="btn" id="start-btn">CLICK TO PLAY</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
